<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent</title>
    <style>
        :root {
            --bg: #0c0c0f; --surface: #16161d; --surface2: #1c1c24;
            --border: #2a2a35; --text: #e8e8ed; --text2: #8888a0;
            --accent: #6c5ce7; --accent2: #a29bfe; --success: #00b894; --danger: #d63031;
            --radius: 14px; --font: 'Inter', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .auth-card { background: var(--surface); padding: 44px 40px; border-radius: 20px; width: 420px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .auth-card .icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
        .auth-card h2 { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        .auth-card .sub { text-align: center; color: var(--text2); font-size: 13px; margin-bottom: 32px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
        .field input { width: 100%; padding: 13px 15px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: var(--font); transition: all 0.2s; }
        .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,92,231,0.1); }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #5f50d9; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(108,92,231,0.3); }
        .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
        .auth-link a { color: var(--accent2); cursor: pointer; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }

        #appScreen { height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand .avatar { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .brand h3 { font-size: 15px; font-weight: 600; }
        .brand .dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 4px; }
        .brand .status-text { font-size: 11px; color: var(--text2); }
        .header-btns { display: flex; gap: 8px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; }
        .icon-btn:hover { background: var(--surface2); color: var(--text); }

        main { flex: 1; overflow-y: auto; padding: 24px; }
        .welcome { text-align: center; margin-top: 60px; }
        .welcome .w-icon { width: 72px; height: 72px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
        .welcome h2 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
        .welcome p { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
        .quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 480px; margin: 0 auto; }
        .q-card { padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .q-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); }
        .q-card .q-icon { font-size: 20px; }
        .q-card .q-label { font-size: 13px; font-weight: 500; }

        .msg { display: flex; margin-bottom: 20px; animation: in 0.25s ease; }
        @keyframes in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { justify-content: flex-end; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .agent .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); margin-right: 10px; }
        .user .msg-avatar { background: var(--surface2); margin-left: 10px; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
        .user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .agent .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .tag.command { background: rgba(108,92,231,0.15); color: var(--accent2); }
        .tag.chat { background: rgba(0,184,148,0.15); color: var(--success); }
        .exec-result { display: block; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; color: var(--success); }

        .typing { display: flex; gap: 4px; padding: 4px 0; }
        .typing span { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        footer { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #cmdInput { flex: 1; padding: 12px 18px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 25px; color: var(--text); font-size: 14px; font-family: var(--font); transition: all 0.2s; }
        #cmdInput:focus { outline: none; border-color: var(--accent); }
        #cmdInput::placeholder { color: #555; }
        .circle-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
        #voiceBtn { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
        #voiceBtn:hover { border-color: var(--accent); color: var(--accent); }
        #voiceBtn.active { background: var(--danger); border-color: var(--danger); color: white; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(214,48,49,0.4); } 70% { box-shadow: 0 0 0 12px rgba(214,48,49,0); } 100% { box-shadow: 0 0 0 0 rgba(214,48,49,0); } }
        #sendBtn { background: var(--accent); color: white; }
        #sendBtn:hover { background: #5f50d9; }

        .toast { position: fixed; top: 20px; right: 20px; z-index: 999; padding: 12px 20px; border-radius: 10px; color: white; font-size: 13px; font-weight: 500; animation: slideIn 0.3s ease; max-width: 350px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--accent); }
    </style>
</head>
<body>
    <div id="loginScreen" class="screen">
        <div class="auth-card">
            <div class="icon">⚡</div>
            <h2>AI Agent</h2>
            <p class="sub">Your intelligent assistant</p>
            <div id="loginForm">
                <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com"></div>
                <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
                <button class="btn btn-primary" onclick="login()">Sign In</button>
                <p class="auth-link">No account? <a onclick="showRegister()">Create one</a></p>
            </div>
            <div id="registerForm" class="hidden">
                <div class="field"><label>Name</label><input type="text" id="regName" placeholder="Your name"></div>
                <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com"></div>
                <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Min 6 characters"></div>
                <button class="btn btn-primary" onclick="register()">Create Account</button>
                <p class="auth-link">Have account? <a onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden">
        <header>
            <div class="brand">
                <div class="avatar">⚡</div>
                <div><h3>AI Agent</h3><div><span class="dot"></span><span class="status-text">Active</span></div></div>
            </div>
            <div class="header-btns">
                <button class="icon-btn" onclick="clearChat()">↻</button>
                <button class="icon-btn" onclick="logout()">→</button>
            </div>
        </header>
        <main id="messages">
            <div class="welcome" id="welcome">
                <div class="w-icon">⚡</div>
                <h2>What can I do for you?</h2>
                <p>Type or click 🎤 to speak</p>
                <div class="quick-grid" id="quickGrid"></div>
            </div>
        </main>
        <footer>
            <button class="circle-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            <input type="text" id="cmdInput" placeholder="Ask me anything..." autofocus>
            <button class="circle-btn" id="sendBtn" onclick="send()">➤</button>
        </footer>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let recognition = null;
        let listening = false;

        const quickItems = [
            { icon: '📺', label: 'Open YouTube', cmd: 'Open YouTube' },
            { icon: '🔍', label: 'Search something', cmd: 'Search for latest tech news' },
            { icon: '🌤️', label: 'Check weather', cmd: 'Weather in London' },
            { icon: '😄', label: 'Tell a joke', cmd: 'Tell me a joke' },
            { icon: '⏰', label: 'What time is it?', cmd: 'What time is it?' },
            { icon: '🧮', label: 'Open Calculator', cmd: 'Open calculator' },
            { icon: '💻', label: 'System info', cmd: 'System info' },
            { icon: '💬', label: 'Say hello', cmd: 'Hello' }
        ];

        function initVoice() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { document.getElementById('voiceBtn').style.display = 'none'; return; }
            recognition = new SR();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                listening = true;
                document.getElementById('voiceBtn').classList.add('active');
                document.getElementById('cmdInput').placeholder = '🎤 Speaking...';
                document.getElementById('cmdInput').value = '';
            };
            
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('cmdInput').value = transcript;
                if (event.results[event.results.length - 1].isFinal && transcript.trim()) {
                    setTimeout(() => send(), 400);
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Voice:', event.error);
                if (event.error === 'not-allowed') toast('Microphone blocked. Allow in browser settings.', 'error');
                if (event.error !== 'no-speech' && event.error !== 'aborted') toast('Voice error: ' + event.error, 'error');
                stopVoice();
            };
            
            recognition.onend = () => stopVoice();
        }

        function toggleVoice() {
            if (!recognition) { toast('Use Chrome/Edge for voice', 'info'); return; }
            listening ? stopVoice() : startVoice();
        }
        function startVoice() {
            try { recognition.start(); } catch(e) { stopVoice(); setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 300); }
        }
        function stopVoice() {
            listening = false;
            document.getElementById('voiceBtn').classList.remove('active');
            document.getElementById('cmdInput').placeholder = 'Ask me anything...';
            try { recognition.stop(); } catch(e) {}
        }

        function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
        function showLogin() { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }

        async function login() {
            const e = document.getElementById('loginEmail').value.trim(), p = document.getElementById('loginPassword').value;
            if (!e || !p) return toast('Fill all fields', 'error');
            try {
                const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:e,password:p}) });
                const d = await r.json(); if (!r.ok) throw new Error(d.error);
                token = d.token; localStorage.setItem('token', token); showApp();
            } catch(x) { toast(x.message, 'error'); }
        }

        async function register() {
            const n = document.getElementById('regName').value.trim(), e = document.getElementById('regEmail').value.trim(), p = document.getElementById('regPassword').value;
            if (!n || !e || !p) return toast('Fill all fields', 'error');
            if (p.length < 6) return toast('Password too short', 'error');
            try {
                const r = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n,email:e,password:p}) });
                const d = await r.json(); if (!r.ok) throw new Error(d.error);
                token = d.token; localStorage.setItem('token', token); showApp();
            } catch(x) { toast(x.message, 'error'); }
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('cmdInput').focus();
            document.getElementById('quickGrid').innerHTML = quickItems.map(q => `<div class="q-card" onclick="quick('${q.cmd}')"><span class="q-icon">${q.icon}</span><span class="q-label">${q.text}</span></div>`).join('');
            initVoice();
        }

        function logout() { localStorage.clear(); location.reload(); }
        function clearChat() { document.getElementById('messages').innerHTML = ''; showApp(); }
        function quick(c) { document.getElementById('cmdInput').value = c; send(); }

        async function send() {
            const inp = document.getElementById('cmdInput');
            const cmd = inp.value.trim();
            if (!cmd) return;
            document.getElementById('welcome')?.remove();
            addMessage(cmd, 'user');
            inp.value = '';
            stopVoice();
            const tid = showTyping();
            try {
                const r = await fetch('/api/agent', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({message:cmd}) });
                const d = await r.json();
                removeTyping(tid);
                if (!r.ok) throw new Error(d.error);
                addMessage(d.message, 'agent', d.type, d.result || '');
            } catch(x) {
                removeTyping(tid);
                addMessage('Sorry, failed to process.', 'agent', 'chat', '');
            }
        }

        function addMessage(text, sender, type, result) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            let html = sender === 'agent' ? '<div class="msg-avatar">⚡</div>' : '';
            html += '<div class="bubble">';
            if (type && sender === 'agent') html += `<span class="tag ${type}">${type === 'command' ? '⚡ ACTION' : '💬 CHAT'}</span>`;
            html += escapeHTML(text);
            if (result && result !== 'Done' && result !== '') html += `<span class="exec-result">✓ ${escapeHTML(result)}</span>`;
            html += '</div>';
            if (sender === 'user') html += '<div class="msg-avatar">👤</div>';
            div.innerHTML = html;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({behavior:'smooth'});
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.className = 'msg agent'; div.id = id;
            div.innerHTML = '<div class="msg-avatar">⚡</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({behavior:'smooth'});
            return id;
        }
        function removeTyping(id) { document.getElementById(id)?.remove(); }
        function escapeHTML(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function toast(m, type) {
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('cmdInput')) { e.preventDefault(); send(); }
            if (e.ctrlKey && e.key === 'm') { e.preventDefault(); toggleVoice(); }
        });

        if (token) showApp();
    </script>
</body>
</html>
