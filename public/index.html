<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phone Agent</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
        <div class="auth-card">
            <div class="logo">🤖</div>
            <h1>AI Agent</h1>
            <p class="subtitle">Your Personal Device Assistant</p>
            
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="handleLogin()" class="btn-primary">Sign In</button>
                <p class="switch">New user? <a onclick="showRegister()">Create account</a></p>
            </div>
            
            <div id="registerForm" class="hidden">
                <input type="text" id="regName" placeholder="Full name">
                <input type="email" id="regEmail" placeholder="Email address">
                <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
                <button onclick="handleRegister()" class="btn-primary">Create Account</button>
                <p class="switch">Have an account? <a onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appScreen" class="screen hidden">
        <header>
            <div class="brand">
                <span class="avatar">🤖</span>
                <div>
                    <h2>AI Agent</h2>
                    <span class="status">● Online</span>
                </div>
            </div>
            <button onclick="logout()" class="btn-secondary">Logout</button>
        </header>

        <main id="messages">
            <div class="welcome">
                <div class="welcome-icon">🤖</div>
                <h2>How can I help you?</h2>
                <p>Try these commands:</p>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </main>

        <footer>
            <input type="text" id="commandInput" placeholder="Type a command..." autofocus>
            <button onclick="sendCommand()" class="btn-send">Send</button>
        </footer>
    </div>

    <script src="/script.js"></script>
</body>
</html>
