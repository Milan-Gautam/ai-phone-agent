<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent</title>
    <style>
        :root { --bg:#0c0c0f; --surface:#16161d; --surface2:#1c1c24; --border:#2a2a35; --text:#e8e8ed; --text2:#8888a0; --accent:#6c5ce7; --accent2:#a29bfe; --success:#00b894; --danger:#d63031; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
        .hidden{display:none!important}
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
        
        .screen{height:100vh;display:flex;align-items:center;justify-content:center}
        .auth-card{background:var(--surface);padding:40px;border-radius:20px;width:400px;border:1px solid var(--border)}
        .auth-card .logo{font-size:50px;text-align:center;margin-bottom:15px}
        .auth-card h2{text-align:center;margin-bottom:5px}
        .auth-card .sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:30px}
        .field{margin-bottom:15px}
        .field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:5px;font-weight:600}
        .field input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px}
        .field input:focus{outline:none;border-color:var(--accent)}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:var(--accent);color:white}
        .btn:hover{opacity:0.9}
        .auth-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
        .auth-link a{color:var(--accent2);cursor:pointer}
        
        #appScreen{height:100vh;display:flex;flex-direction:column}
        header{padding:15px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .brand{display:flex;align-items:center;gap:10px}
        .brand .avatar{font-size:25px}
        .brand h3{font-size:14px}
        .brand .dot{color:var(--success);font-size:10px}
        header button{padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer}
        
        main{flex:1;overflow-y:auto;padding:20px}
        .welcome{text-align:center;margin-top:50px}
        .welcome .w-icon{font-size:60px;margin-bottom:15px}
        .welcome h2{margin-bottom:5px}
        .welcome p{color:var(--text2);margin-bottom:20px}
        .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:0 auto}
        .q-card{padding:15px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s}
        .q-card:hover{border-color:var(--accent)}
        
        .msg{display:flex;margin-bottom:15px;animation:fadeIn 0.3s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{justify-content:flex-end}
        .bubble{max-width:75%;padding:12px 16px;border-radius:15px;font-size:14px;line-height:1.5}
        .user .bubble{background:var(--accent);border-bottom-right-radius:4px}
        .agent .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
        .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:5px}
        .tag.command{background:rgba(108,92,231,0.2);color:var(--accent2)}
        .tag.chat{background:rgba(0,184,148,0.2);color:var(--success)}
        .result-text{display:block;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--success)}
        
        .typing-dots{display:flex;gap:4px;padding:5px 0}
        .typing-dots span{width:6px;height:6px;background:var(--text2);border-radius:50%;animation:bounce 1.4s infinite}
        .typing-dots span:nth-child(2){animation-delay:0.2s}
        .typing-dots span:nth-child(3){animation-delay:0.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
        
        footer{padding:15px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
        #cmdInput{flex:1;padding:12px 18px;background:var(--bg);border:1px solid var(--border);border-radius:25px;color:var(--text);font-size:14px}
        #cmdInput:focus{outline:none;border-color:var(--accent)}
        #cmdInput::placeholder{color:#555}
        .circle-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        #voiceBtn{background:transparent;border:1px solid var(--border);color:var(--text2)}
        #voiceBtn.active{background:var(--danger);border-color:var(--danger);color:white;animation:pulse 2s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(214,48,49,0.4)}70%{box-shadow:0 0 0 12px rgba(214,48,49,0)}100%{box-shadow:0 0 0 0 rgba(214,48,49,0)}}
        #sendBtn{background:var(--accent);color:white}
    </style>
</head>
<body>
    <div id="loginScreen" class="screen">
        <div class="auth-card">
            <div class="logo">⚡</div>
            <h2>AI Agent</h2>
            <p class="sub">Your intelligent assistant</p>
            <div id="loginForm">
                <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com"></div>
                <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
                <button class="btn" onclick="login()">Sign In</button>
                <p class="auth-link">No account? <a onclick="showRegister()">Create one</a></p>
            </div>
            <div id="registerForm" class="hidden">
                <div class="field"><label>Name</label><input type="text" id="regName" placeholder="Your name"></div>
                <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com"></div>
                <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Min 6 characters"></div>
                <button class="btn" onclick="register()">Create Account</button>
                <p class="auth-link">Have account? <a onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden">
        <header>
            <div class="brand">
                <span class="avatar">⚡</span>
                <div><h3>AI Agent</h3><span class="dot">● Online</span></div>
            </div>
            <button onclick="logout()">Logout</button>
        </header>
        <main id="messages">
            <div class="welcome" id="welcome">
                <div class="w-icon">⚡</div>
                <h2>How can I help you?</h2>
                <p>Type a command or click 🎤 to speak</p>
                <div class="quick-grid" id="quickGrid"></div>
            </div>
        </main>
        <footer>
            <button class="circle-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice command">🎤</button>
            <input type="text" id="cmdInput" placeholder="Type here..." autofocus>
            <button class="circle-btn" id="sendBtn" onclick="sendMsg()">➤</button>
        </footer>
    </div>

    <script>
        var token = localStorage.getItem('token');
        var recognition = null;
        var listening = false;

        // Quick actions
        var quickItems = [
            { icon: '📺', text: 'Open YouTube', cmd: 'Open YouTube' },
            { icon: '🔍', text: 'Search something', cmd: 'Search for cats' },
            { icon: '🌤️', text: 'Check weather', cmd: 'Weather in London' },
            { icon: '😄', text: 'Tell a joke', cmd: 'Tell me a joke' },
            { icon: '⏰', text: 'What time is it?', cmd: 'What time is it?' },
            { icon: '🧮', text: 'Open Calculator', cmd: 'Open calculator' },
            { icon: '💻', text: 'System info', cmd: 'System info' },
            { icon: '💬', text: 'Say hello', cmd: 'Hello' }
        ];

        // Voice setup
        function setupVoice() {
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voiceBtn').style.display = 'none';
                console.log('Voice not supported');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = function() {
                listening = true;
                document.getElementById('voiceBtn').classList.add('active');
                document.getElementById('cmdInput').placeholder = 'Listening...';
            };
            
            recognition.onresult = function(event) {
                var text = event.results[0][0].transcript;
                document.getElementById('cmdInput').value = text;
                if (text.trim()) {
                    setTimeout(function() { sendMsg(); }, 300);
                }
            };
            
            recognition.onerror = function(event) {
                console.log('Voice error:', event.error);
                if (event.error === 'not-allowed') {
                    alert('Please allow microphone access in your browser settings to use voice commands.');
                }
                stopVoice();
            };
            
            recognition.onend = function() {
                stopVoice();
            };
        }

        function toggleVoice() {
            if (!recognition) {
                alert('Voice commands require Chrome or Edge browser.');
                return;
            }
            if (listening) {
                stopVoice();
            } else {
                try {
                    recognition.start();
                } catch(e) {
                    stopVoice();
                }
            }
        }

        function stopVoice() {
            listening = false;
            document.getElementById('voiceBtn').classList.remove('active');
            document.getElementById('cmdInput').placeholder = 'Type here...';
            try { recognition.stop(); } catch(e) {}
        }

        // Auth functions
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        async function login() {
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert('Please fill all fields');
            try {
                var r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                var d = await r.json();
                if (!r.ok) throw new Error(d.error);
                token = d.token;
                localStorage.setItem('token', token);
                showApp();
            } catch(e) {
                alert(e.message);
            }
        }

        async function register() {
            var name = document.getElementById('regName').value.trim();
            var email = document.getElementById('regEmail').value.trim();
            var password = document.getElementById('regPassword').value;
            if (!name || !email || !password) return alert('Please fill all fields');
            if (password.length < 6) return alert('Password must be at least 6 characters');
            try {
                var r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email, password: password })
                });
                var d = await r.json();
                if (!r.ok) throw new Error(d.error);
                token = d.token;
                localStorage.setItem('token', token);
                showApp();
            } catch(e) {
                alert(e.message);
            }
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('cmdInput').focus();
            
            // Render quick actions
            var grid = document.getElementById('quickGrid');
            grid.innerHTML = '';
            for (var i = 0; i < quickItems.length; i++) {
                var item = quickItems[i];
                var card = document.createElement('div');
                card.className = 'q-card';
                card.onclick = (function(cmd) { return function() { quickSend(cmd); }; })(item.cmd);
                card.innerHTML = '<span>' + item.icon + '</span> ' + item.text;
                grid.appendChild(card);
            }
            
            setupVoice();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function quickSend(cmd) {
            document.getElementById('cmdInput').value = cmd;
            sendMsg();
        }

        async function sendMsg() {
            var input = document.getElementById('cmdInput');
            var cmd = input.value.trim();
            if (!cmd) return;
            
            var welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();
            
            addMessage(cmd, 'user');
            input.value = '';
            stopVoice();
            
            var typingId = showTyping();
            
            try {
                var r = await fetch('/api/agent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ message: cmd })
                });
                var d = await r.json();
                removeTyping(typingId);
                if (!r.ok) throw new Error(d.error);
                addMessage(d.message, 'agent', d.type, d.result || '');
            } catch(e) {
                removeTyping(typingId);
                addMessage('Sorry, something went wrong.', 'agent', 'chat', '');
            }
        }

        function addMessage(text, sender, type, result) {
            var div = document.createElement('div');
            div.className = 'msg ' + sender;
            
            var html = '<div class="bubble">';
            if (type && sender === 'agent') {
                var tagText = type === 'command' ? 'ACTION' : 'CHAT';
                var tagClass = type === 'command' ? 'command' : 'chat';
                html += '<span class="tag ' + tagClass + '">' + tagText + '</span>';
            }
            html += text.replace(/\n/g, '<br>');
            if (result && result !== '' && result !== 'Done') {
                html += '<span class="result-text">' + result + '</span>';
            }
            html += '</div>';
            
            div.innerHTML = html;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function showTyping() {
            var id = 'typing-' + Date.now();
            var div = document.createElement('div');
            div.className = 'msg agent';
            div.id = id;
            div.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
            return id;
        }

        function removeTyping(id) {
            var el = document.getElementById(id);
            if (el) el.remove();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('cmdInput')) {
                e.preventDefault();
                sendMsg();
            }
        });

        // Start app if logged in
        if (token) showApp();
    </script>
</body>
</html>
